name: Build, Push to ACR,

on:
  push:
    branches: 
      - master

env:
  # Azure Container Registry settings
  ACR_NAME: ${{ secrets.ACR_NAME }}                   # e.g. myregistry (without .azurecr.io)
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}   # e.g. myregistry.azurecr.io
  IMAGE_NAME: sammys-test-image

jobs:
  build-and-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }} #a unique GUID identifying a registered application in Microsoft Entra ID (formerly Azure Active Directory), used for authentication in the Azure SDK and environment variables
          tenant-id: ${{ secrets.AZURE_TENANT_ID }} #a unique GUID (Globally Unique Identifier) representing your organization's dedicated instance of Microsoft Entra ID (formerly Azure Active Directory)
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }} #a unique, alphanumeric GUID (Globally Unique Identifier) that identifies a specific Azure subscription, acting as a container for billing and resource management

      - name: Get ACR login server
        id: acr
        run: |
          LOGIN_SERVER=$(az acr show --name $ACR_NAME --query loginServer -o tsv)
          echo "login_server=$LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Log in to ACR
        run: az acr login --name $ACR_NAME

      - name: Build image
        run: |
          docker build -t ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${{ github.sha }} .
          docker tag ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${{ github.sha }} \
                     ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:latest

      - name: Push image tags
        run: |
          docker push ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:latest